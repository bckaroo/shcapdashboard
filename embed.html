<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SHCAP Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,500;9..40,700;9..40,800&family=DM+Mono:wght@400;600&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:#fff;color:#1a1a1a;margin:0;overflow:hidden}
.dashboard{display:grid;grid-template-columns:7fr 3fr;height:100vh}
.chart-panel{display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;background:#fafbfc}
.chart-wrap{position:relative;width:min(88vh,88%);height:min(88vh,88%)}
.chart-wrap svg{width:100%;height:100%}
.chart-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none}
.chart-center .num{font-family:'Playfair Display',serif;font-size:3vw;font-weight:800;color:#fff}
.chart-center .lbl{font-size:.9vw;color:rgba(255,255,255,.6);font-weight:500;letter-spacing:.05em;text-transform:uppercase}
.tooltip{position:fixed;background:#fff;border:none;border-radius:10px;padding:12px 16px;font-size:13px;pointer-events:none;z-index:100;opacity:0;transition:opacity .12s;box-shadow:0 8px 30px rgba(0,0,0,.12);max-width:280px;line-height:1.5}
.tooltip.show{opacity:1}
.legend{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);display:flex;gap:24px;font-size:13px;color:#888;font-weight:500}
.legend-item{display:flex;align-items:center;gap:6px}
.legend-dot{width:12px;height:12px;border-radius:3px}
.detail-panel{border-left:1px solid #eee;padding:28px 24px;display:flex;flex-direction:column;overflow-y:auto;background:#fff}
.detail-panel .empty{color:#ccc;font-size:15px;text-align:center;margin-top:60px;line-height:1.7;font-weight:300}
.detail-panel .empty .big-icon{font-size:3rem;margin-bottom:16px;display:block;opacity:.5}
.d-badge{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:700;padding:4px 12px;border-radius:20px;margin-bottom:12px;letter-spacing:.03em;font-family:'DM Mono',monospace}
.d-badge.mit{background:#ecfdf5;color:#065f46}
.d-badge.adp{background:#e0f2fe;color:#075985}
.d-title{font-family:'Playfair Display',serif;font-size:20px;font-weight:800;line-height:1.3;margin-bottom:6px;color:#1a1a1a}
.d-strategy{font-size:13px;color:#0ea5e9;font-weight:500;margin-bottom:20px;cursor:pointer}
.d-strategy:hover{text-decoration:underline}
.d-section{margin-bottom:18px}
.d-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#ccc;margin-bottom:8px}
.d-text{font-size:13.5px;color:#555;line-height:1.7}
.d-kv{display:flex;gap:8px;font-size:13px;margin-bottom:6px;line-height:1.4}
.d-kv .k{color:#bbb;min-width:76px;font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.04em}
.d-kv .v{color:#444;font-weight:500}
.d-bar{height:6px;background:#f0f0f0;border-radius:3px;overflow:hidden;margin:12px 0}
.d-bar .fill{height:100%;border-radius:3px}
.d-status-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.d-status{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.04em}
.d-pct{font-family:'DM Mono',monospace;font-size:18px;font-weight:700}
.d-tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:14px}
.d-tag{font-size:11px;font-weight:600;padding:4px 10px;border-radius:16px;cursor:pointer;transition:all .2s;border:1.5px solid transparent}
.d-tag:hover{transform:scale(1.05);box-shadow:0 2px 8px rgba(0,0,0,.1)}
.d-tag.cat{background:#f0f9ff;color:#0369a1;border-color:#bae6fd}
.d-tag.strat{background:#fefce8;color:#a16207;border-color:#fde68a}
.d-tag.type-mit{background:#ecfdf5;color:#065f46;border-color:#a7f3d0}
.d-tag.type-adp{background:#e0f2fe;color:#075985;border-color:#7dd3fc}
.d-tag.pri{background:#fffbeb;color:#92400e;border-color:#fde68a}
.d-tag.impl{background:#fdf4ff;color:#7e22ce;border-color:#e9d5ff}
.impl-link{display:block;margin-bottom:4px;padding:6px 8px;background:#f8fafc;border-radius:6px;cursor:pointer;color:#0ea5e9;font-weight:500;transition:background .15s;font-size:13px}
.impl-link:hover{background:#f0f9ff}
.dimmed{opacity:.15!important}
.clear-btn{margin-top:16px;font-size:11px;color:#ccc;cursor:pointer}
.clear-btn:hover{color:#999}
@media(max-width:700px){.dashboard{grid-template-columns:1fr;grid-template-rows:55vh auto}.detail-panel{border-left:none;border-top:1px solid #eee;max-height:45vh}}
</style>
</head>
<body>
<div class="dashboard">
  <div class="chart-panel">
    <div class="chart-wrap">
      <svg id="chart" viewBox="0 0 500 500" style="transform:rotate(-90deg)"></svg>
      <div class="chart-center"><div class="num" id="centerNum">56</div><div class="lbl">Actions</div></div>
    </div>
    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:#059669"></div>Mitigation (19)</div>
      <div class="legend-item"><div class="legend-dot" style="background:#0284c7"></div>Adaptation (37)</div>
    </div>
    <div class="tooltip" id="tooltip"></div>
  </div>
  <div class="detail-panel" id="detailPanel">
    <div class="empty"><span class="big-icon">◎</span>Click any segment to explore<br>the Sleepy Hollow Climate Action Plan</div>
  </div>
</div>
<script>
var all=[];
var SHEET_URL='https://docs.google.com/spreadsheets/d/e/2PACX-1vTTwqCaKVEsnHqoV_OPSU0KbcNsliv_mjR0G4NfmP0hxER26GJggeW-28KJ2Apz9rn7Pfptos8g4Egd/pub?gid=0&single=true&output=csv';

function parseCSV(text){
  var rows=[],row=[],inQ=false,field='';
  for(var i=0;i<text.length;i++){
    var c=text[i];
    if(inQ){
      if(c==='""'){field+='"';i++;}
      else if(c==='"'){inQ=false;}
      else{field+=c;}
    }else{
      if(c==='"'){inQ=true;}
      else if(c===','){row.push(field);field='';}
      else if(c==='\n'){row.push(field);rows.push(row);row=[];field='';}
      else if(c==='\r'){/*skip*/}
      else{field+=c;}
    }
  }
  if(field||row.length){row.push(field);rows.push(row);}
  return rows;
}

function csvToActions(rows){
  var headers=rows[0].map(function(h){return h.trim();});
  var actions=[];
  for(var i=1;i<rows.length;i++){
    var r=rows[i];
    if(!r||!r[0]||!r[0].trim())continue;
    var get=function(name){var idx=headers.indexOf(name);return idx>=0&&idx<r.length?(r[idx]||'').trim():'';};
    var implProjects=get('Implementation Projects');
    actions.push({
      id:get('ID'),
      category:get('Category'),
      strategy:get('Strategy'),
      action:get('Action'),
      description:get('Description'),
      type:get('Type'),
      priority:get('Priority'),
      status:get('Status'),
      percentComplete:parseInt(get('% Complete'))||0,
      cscPoints:get('CSC Points'),
      targetDate:get('Target Date'),
      responsibleParty:get('Responsible Party'),
      funding:get('Funding'),
      implementationProjects:implProjects?implProjects.split(/[;|]/).map(function(s){return s.trim();}).filter(function(s){return s;}):[],
      notes:get('Notes'),
      scoring:{
        champion:get('Champion'),
        village:get('Village'),
        community:get('Community'),
        villageCommunity:get('Village-Community Partnership'),
        s01:get('S01 Climate Action'),
        s02:get('S02 Community'),
        s03:get('S03 Governance'),
        strategyRanking:get('Strategy Ranking'),
        a01:get('A01 Criticality'),
        a02:get('A02 Cost'),
        a03:get('A03 Impact'),
        a04:get('A04 Alignment'),
        a05:get('A05 Implementation'),
        actionRanking:get('Action Ranking'),
        prioritizationScore:get('Prioritization Score'),
        committeeAdj:get('Committee Adjustment'),
        committeeNotes:get('Committee Notes'),
        finalScore:get('Final Prioritization Score')
      }
    });
  }
  return actions;
}

function loadData(){
  var url=SHEET_URL+'&t='+Date.now();
  fetch(url)
    .then(function(res){if(!res.ok)throw new Error('HTTP '+res.status);return res.text();})
    .then(function(text){
      var rows=parseCSV(text);
      all=csvToActions(rows);
      render();
    })
    .catch(function(err){
      console.error('SHCAP data load failed:',err);
      var cc=document.querySelector('.chart-center');
      if(cc){cc.innerHTML='<div style="color:#e74c3c;font-size:14px">Data unavailable</div>';}
    });
}
var allCircles=[];

function render(){
  var svg=document.getElementById('chart');
  svg.innerHTML='';
  allCircles=[];
  if(!all.length)return;
  var cx=250,cy=250;
  var items=all.slice().sort(function(a,b){
    if(a.type!==b.type)return a.type==='Mitigation'?-1:1;
    if(a.category!==b.category)return a.category.localeCompare(b.category);
    if(a.priority!==b.priority)return a.priority==='Priority'?-1:1;
    return a.id.localeCompare(b.id);
  });
  var strategies=[],stratMap={};
  items.forEach(function(a){var k=a.strategy||'Other';if(!stratMap[k]){stratMap[k]={name:k,type:a.type,count:0};strategies.push(stratMap[k])}stratMap[k].count++});
  var cats=[],catMap={};
  items.forEach(function(a){var k=a.category;if(!catMap[k]){catMap[k]={name:k,type:a.type,count:0,countInType:0};cats.push(catMap[k])}catMap[k].count++});

  // Count items per type for 50/50 split
  var mitCount=items.filter(function(a){return a.type==='Mitigation'}).length;
  var adpCount=items.filter(function(a){return a.type==='Adaptation'}).length;
  // Count categories per type
  var mitCats=cats.filter(function(c){return c.type==='Mitigation'});
  var adpCats=cats.filter(function(c){return c.type==='Adaptation'});

  var mitColors=['#064e3b','#065f46','#047857','#059669','#10b981','#34d399','#6ee7b7'];
  var adpColors=['#0c4a6e','#075985','#0369a1','#0284c7','#38bdf8','#7dd3fc','#bae6fd'];
  var total=items.length;

  svg.innerHTML+='<circle cx="'+cx+'" cy="'+cy+'" r="75" fill="#34495e"/>';
  svg.innerHTML+='<circle cx="'+cx+'" cy="'+cy+'" r="100" fill="none" stroke="#f3f4f6" stroke-width="22"/>';
  svg.innerHTML+='<circle cx="'+cx+'" cy="'+cy+'" r="135" fill="none" stroke="#f3f4f6" stroke-width="24"/>';
  svg.innerHTML+='<circle cx="'+cx+'" cy="'+cy+'" r="175" fill="none" stroke="#f3f4f6" stroke-width="36"/>';

  // Ring 1: categories - 50/50 split between Mit and Adp
  var circ1=2*Math.PI*100;
  var off=0;
  // Mitigation categories get 50% of ring, split by their action count
  mitCats.forEach(function(c){
    var seg=circ1*0.5*c.count/mitCount;
    var el=mkRing(cx,cy,100,22,seg,circ1,off,'#059669');
    el.style.cursor='pointer';el._ring='cat';el._name=c.name;el._type=c.type;el._count=c.count;
    el.addEventListener('mouseenter',function(e){el.style.opacity='.7';showTip(e,{name:c.name,type:c.type,count:c.count})});
    el.addEventListener('mousemove',function(e){moveTip(e)});
    el.addEventListener('mouseleave',function(){if(!el.classList.contains('dimmed'))el.style.opacity='1';hideTip()});
    el.addEventListener('click',function(){highlight('cat',c.name);showCategory(c.name,c.type,c.count)});
    svg.appendChild(el);allCircles.push(el);off+=seg;
  });
  // Adaptation categories get 50% of ring
  adpCats.forEach(function(c){
    var seg=circ1*0.5*c.count/adpCount;
    var el=mkRing(cx,cy,100,22,seg,circ1,off,'#0284c7');
    el.style.cursor='pointer';el._ring='cat';el._name=c.name;el._type=c.type;el._count=c.count;
    el.addEventListener('mouseenter',function(e){el.style.opacity='.7';showTip(e,{name:c.name,type:c.type,count:c.count})});
    el.addEventListener('mousemove',function(e){moveTip(e)});
    el.addEventListener('mouseleave',function(){if(!el.classList.contains('dimmed'))el.style.opacity='1';hideTip()});
    el.addEventListener('click',function(){highlight('cat',c.name);showCategory(c.name,c.type,c.count)});
    svg.appendChild(el);allCircles.push(el);off+=seg;
  });

  // Ring 2: strategies - 50/50 split
  var mitI=0,adpI=0,soff=0;
  var circ2=2*Math.PI*135;
  strategies.forEach(function(s){
    var typeTotal=s.type==='Mitigation'?mitCount:adpCount;
    var seg=circ2*0.5*s.count/typeTotal;
    var pal=s.type==='Mitigation'?mitColors:adpColors;
    var ci=s.type==='Mitigation'?mitI++:adpI++;
    var col=pal[ci%pal.length];
    var el=mkRing(cx,cy,135,24,seg,circ2,soff,col);
    el.style.cursor='pointer';el._ring='strat';el._name=s.name;el._type=s.type;el._count=s.count;
    el.addEventListener('mouseenter',function(e){el.style.opacity='.7';showTip(e,{name:s.name,type:s.type,count:s.count})});
    el.addEventListener('mousemove',function(e){moveTip(e)});
    el.addEventListener('mouseleave',function(){if(!el.classList.contains('dimmed'))el.style.opacity='1';hideTip()});
    el.addEventListener('click',function(){highlight('strat',s.name);showStrategy(s.name,s.type,s.count)});
    svg.appendChild(el);allCircles.push(el);soff+=seg;
  });

  // Ring 3: actions - 50/50 split, weighted by score within category
  var catScoreTotals={};
  items.forEach(function(a){var c=a.category;if(!catScoreTotals[c])catScoreTotals[c]=0;catScoreTotals[c]+=(a.scoring?parseInt(a.scoring.finalScore)||18:18)});
  var circ3=2*Math.PI*175;
  var catStartOff=0;

  // Mitigation side (first 50%)
  mitCats.forEach(function(cat){
    var catSlice=circ3*0.5*cat.count/mitCount;
    var catItems=items.filter(function(a){return a.category===cat.name});
    var catTotal=catScoreTotals[cat.name]||1;
    var catInnerOff=0;
    catItems.forEach(function(a){
      var r=175,circ=2*Math.PI*r;
      var score=a.scoring?parseInt(a.scoring.finalScore)||18:18;
      var seg=catSlice*score/catTotal;
      var si=strategies.findIndex(function(s){return s.name===a.strategy});
      var col=mitColors[Math.abs(si)%mitColors.length];
      var el=mkRing(cx,cy,r,36,seg,circ,catStartOff+catInnerOff,col);
      el.style.cursor='pointer';el._ring='action';el._name=a.id;el._cat=a.category;el._strat=a.strategy;el._type=a.type;
      el.addEventListener('mouseenter',function(e){el.style.opacity='.7';showTip(e,a)});
      el.addEventListener('mousemove',function(e){moveTip(e)});
      el.addEventListener('mouseleave',function(){if(!el.classList.contains('dimmed'))el.style.opacity='1';hideTip()});
      el.addEventListener('click',function(){highlight('action',a.id);showAction(a)});
      svg.appendChild(el);allCircles.push(el);catInnerOff+=seg;
    });
    catStartOff+=catSlice;
  });

  // Adaptation side (second 50%)
  adpCats.forEach(function(cat){
    var catSlice=circ3*0.5*cat.count/adpCount;
    var catItems=items.filter(function(a){return a.category===cat.name});
    var catTotal=catScoreTotals[cat.name]||1;
    var catInnerOff=0;
    catItems.forEach(function(a){
      var r=175,circ=2*Math.PI*r;
      var score=a.scoring?parseInt(a.scoring.finalScore)||18:18;
      var seg=catSlice*score/catTotal;
      var si=strategies.findIndex(function(s){return s.name===a.strategy});
      var col=adpColors[Math.abs(si)%adpColors.length];
      var el=mkRing(cx,cy,r,36,seg,circ,catStartOff+catInnerOff,col);
      el.style.cursor='pointer';el._ring='action';el._name=a.id;el._cat=a.category;el._strat=a.strategy;el._type=a.type;
      el.addEventListener('mouseenter',function(e){el.style.opacity='.7';showTip(e,a)});
      el.addEventListener('mousemove',function(e){moveTip(e)});
      el.addEventListener('mouseleave',function(){if(!el.classList.contains('dimmed'))el.style.opacity='1';hideTip()});
      el.addEventListener('click',function(){highlight('action',a.id);showAction(a)});
      svg.appendChild(el);allCircles.push(el);catInnerOff+=seg;
    });
    catStartOff+=catSlice;
  });

  document.getElementById('centerNum').textContent=total;
}

function mkRing(cx,cy,r,sw,segLen,circ,offset,color){
  var c=document.createElementNS('http://www.w3.org/2000/svg','circle');
  c.setAttribute('cx',cx);c.setAttribute('cy',cy);c.setAttribute('r',r);
  c.setAttribute('fill','none');c.setAttribute('stroke',color);c.setAttribute('stroke-width',sw);
  c.setAttribute('stroke-dasharray',(segLen-2)+' '+(circ-segLen+2));
  c.setAttribute('stroke-dashoffset',(-offset)+'');
  c.style.transition='opacity .2s';return c;
}

function highlight(ringType,value){
  allCircles.forEach(function(el){
    var match=false;
    if(ringType==='cat'){
      if(el._ring==='cat'&&el._name===value)match=true;
      if(el._ring==='strat'){var sa=all.filter(function(a){return a.strategy===el._name});if(sa.length&&sa[0].category===value)match=true}
      if(el._ring==='action'&&el._cat===value)match=true;
    }else if(ringType==='strat'){
      if(el._ring==='strat'&&el._name===value)match=true;
      if(el._ring==='action'&&el._strat===value)match=true;
      if(el._ring==='cat'){var sa=all.filter(function(a){return a.strategy===value});if(sa.length&&sa[0].category===el._name)match=true}
    }else if(ringType==='action'){
      var act=all.find(function(a){return a.id===value});if(!act)return;
      if(el._ring==='action'&&el._name===value)match=true;
      if(el._ring==='strat'&&el._name===act.strategy)match=true;
      if(el._ring==='cat'&&el._name===act.category)match=true;
    }
    if(match){el.classList.remove('dimmed');el.style.opacity='1'}
    else{el.classList.add('dimmed');el.style.opacity='.15'}
  });
}
function clearHighlight(){allCircles.forEach(function(el){el.classList.remove('dimmed');el.style.opacity='1'})}

function showTip(e,d){
  var t=document.getElementById('tooltip');
  if(d.id){t.innerHTML='<b>'+d.id+(d.priority==='Priority'?' ★':'')+'</b><br>'+d.action+'<br><span style="color:#999;font-size:12px">'+d.type+' · '+d.category+'</span>'}
  else{t.innerHTML='<b>'+d.name+'</b><br><span style="color:#999;font-size:12px">'+d.type+' · '+d.count+' actions</span>'}
  t.classList.add('show');moveTip(e);
}
function moveTip(e){var t=document.getElementById('tooltip');t.style.left=Math.min(e.clientX+14,window.innerWidth-300)+'px';t.style.top=(e.clientY-50)+'px'}
function hideTip(){document.getElementById('tooltip').classList.remove('show')}

function showCategory(name,type,count){
  var p=document.getElementById('detailPanel');p.innerHTML='';
  addEl(p,'div','d-badge '+(type==='Mitigation'?'mit':'adp'),type);
  addEl(p,'div','d-title',name);
  addEl(p,'div','d-strategy',count+' actions');
  var sec=addEl(p,'div','d-section','');addEl(sec,'div','d-label','Actions');
  all.filter(function(a){return a.category===name}).forEach(function(a){
    var link=addEl(sec,'div','impl-link',a.id+': '+a.action);
    link.addEventListener('click',function(){highlight('action',a.id);showAction(a)});
  });
  addEl(p,'div','clear-btn','✕ Clear highlights').addEventListener('click',clearHighlight);
}
function showStrategy(name,type,count){
  var p=document.getElementById('detailPanel');p.innerHTML='';
  addEl(p,'div','d-badge '+(type==='Mitigation'?'mit':'adp'),type);
  addEl(p,'div','d-title',name);
  addEl(p,'div','d-strategy',count+' actions');
  var sec=addEl(p,'div','d-section','');addEl(sec,'div','d-label','Actions');
  all.filter(function(a){return a.strategy===name}).forEach(function(a){
    var link=addEl(sec,'div','impl-link',a.id+': '+a.action);
    link.addEventListener('click',function(){highlight('action',a.id);showAction(a)});
  });
  addEl(p,'div','clear-btn','✕ Clear highlights').addEventListener('click',clearHighlight);
}
function showAction(a){
  var p=document.getElementById('detailPanel');p.innerHTML='';
  var bCls=a.type==='Mitigation'?'mit':'adp';
  var barClr=a.percentComplete>=70?'#4caf50':a.percentComplete>=30?'#f59e0b':'#e5e7eb';
  var stClr=a.status==='Complete'?'#4caf50':a.status==='In Progress'?'#3b82f6':'#9ca3af';
  var impl=a.implementationProjects||[];
  addEl(p,'div','d-badge '+bCls,a.id+(a.priority==='Priority'?' ★':'')+' · '+(a.type==='Mitigation'?'Mit':'Adp'));
  addEl(p,'div','d-title',a.action);
  var strat=addEl(p,'div','d-strategy',a.strategy+' · '+a.category);strat.addEventListener('click',function(){highlight('strat',a.strategy)});
  var bar=addEl(p,'div','d-bar','');bar.innerHTML='<div class="fill" style="width:'+a.percentComplete+'%;background:'+barClr+'"></div>';
  var sr=addEl(p,'div','d-status-row','');sr.innerHTML='<span class="d-status" style="color:'+stClr+'">'+a.status+'</span><span class="d-pct" style="color:'+barClr+'">'+a.percentComplete+'%</span>';
  var sec=addEl(p,'div','d-section','');addEl(sec,'div','d-label','Description');addEl(sec,'div','d-text',a.description||'No description.');
  if(impl.length){var isec=addEl(p,'div','d-section','');addEl(isec,'div','d-label','Implementation Projects');impl.forEach(function(ip){var link=addEl(isec,'div','impl-link',ip);link.addEventListener('click',function(){all.filter(function(x){return(x.implementationProjects||[]).indexOf(ip)>=0}).forEach(function(x){highlight('action',x.id)})})})}
  if(a.responsibleParty)addKV(p,'Responsible',a.responsibleParty);
  if(a.funding)addKV(p,'Funding',a.funding);
  if(a.cscPoints)addKV(p,'CSC Points',a.cscPoints);
  if(a.targetDate)addKV(p,'Target',a.targetDate);
  var tags=addEl(p,'div','d-tags','');
  addTag(tags,a.category,'cat',function(){highlight('cat',a.category)});
  addTag(tags,a.strategy,'strat',function(){highlight('strat',a.strategy)});
  addTag(tags,a.type,a.type==='Mitigation'?'type-mit':'type-adp',function(){highlight('cat',a.category)});
  if(a.priority==='Priority')addTag(tags,'★ Priority','pri',function(){all.filter(function(x){return x.priority==='Priority'}).forEach(function(x){highlight('action',x.id)})});
  impl.forEach(function(ip){var short=ip.length>22?ip.substring(0,22)+'…':ip;var t=addTag(tags,short,'impl',function(){all.filter(function(x){return(x.implementationProjects||[]).indexOf(ip)>=0}).forEach(function(x){highlight('action',x.id)})});t.title=ip});
  addEl(p,'div','clear-btn','✕ Clear highlights').addEventListener('click',clearHighlight);
}
function addEl(parent,tag,cls,html){var e=document.createElement(tag);e.className=cls;e.innerHTML=html;parent.appendChild(e);return e}
function addKV(parent,k,v){var d=addEl(parent,'div','d-kv','');d.innerHTML='<span class="k">'+k+'</span><span class="v">'+v+'</span>'}
function addTag(parent,text,cls,fn){var s=addEl(parent,'span','d-tag '+cls,text);s.addEventListener('click',fn);return s}

loadData();
</script>
</body></html>
